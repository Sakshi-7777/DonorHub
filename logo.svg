<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#45a049;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Heart shape with medical cross -->
  <g transform="translate(100, 100)">
    <!-- Heart outline -->
    <path d="M 0,-30 C -20,-50 -50,-50 -50,-20 C -50,10 -20,40 0,60 C 20,40 50,10 50,-20 C 50,-50 20,-50 0,-30 Z" 
          fill="url(#logoGradient)" opacity="0.9"/>
    
    <!-- Medical cross inside -->
    <g transform="translate(0, 0)">
      <!-- Vertical line of cross -->
      <rect x="-4" y="-15" width="8" height="30" fill="white" rx="2"/>
      <!-- Horizontal line of cross -->
      <rect x="-15" y="-4" width="30" height="8" fill="white" rx="2"/>
    </g>
  </g>
</svg>
