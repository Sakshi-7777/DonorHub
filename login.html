<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Healthcare - Login</title>
    <link rel="stylesheet" href="styles-main.css">
    <style>
        body {
            background: linear-gradient(135deg, #4caf50, #45a049);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: transparent;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            box-shadow: none;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #4caf50, #45a049);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 1.8em;
        }

        .auth-header p {
            color: #666;
            margin: 0;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.2);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            cursor: pointer;
            margin: 0;
            font-weight: normal;
        }

        .remember-forgot a {
            color: #4caf50;
            text-decoration: none;
            font-weight: 600;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 0.9em;
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
            vertical-align: middle;
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        .auth-footer {
            text-align: center;
            color: #666;
            font-size: 0.95em;
        }

        .auth-footer a {
            color: #4caf50;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .message-box {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }

        .message-box.show {
            display: block;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #2e7d32;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #c62828;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 30px 20px;
            }

            .auth-header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="auth-logo">
                <div class="logo-icon">🌀</div>
                <div class="logo-text">Aura Healthcare</div>
            </div>
            <h1>Welcome Back</h1>
            <p>Your Health Companion</p>
        </div>

        <!-- Message Box -->
        <div id="message-box" class="message-box"></div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox" id="remember">
                    Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <!-- Divider -->
        <div class="divider">OR</div>

        <!-- Register Link -->
        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script src="utils.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // Validate
            if (!email || !password) {
                showAuthMessage('Please fill in all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showAuthMessage('Password must be at least 6 characters', 'error');
                return;
            }

            // Get stored users
            let users = JSON.parse(localStorage.getItem('healthhub-users')) || [];
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                showAuthMessage('Invalid email or password', 'error');
                return;
            }

            // Login successful
            showAuthMessage('Login successful! Redirecting...', 'success');
            
            // Store current user
            localStorage.setItem('current-user', JSON.stringify({
                email: user.email,
                name: user.name,
                loginTime: new Date().toISOString()
            }));

            // Store remember me
            if (remember) {
                localStorage.setItem('remember-email', email);
            }

            // Redirect after 1 second
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1000);
        });

        function showAuthMessage(message, type) {
            const msgBox = document.getElementById('message-box');
            msgBox.textContent = message;
            msgBox.className = `message-box show ${type}-message`;
            
            if (type === 'error') {
                setTimeout(() => {
                    msgBox.classList.remove('show');
                }, 5000);
            }
        }

        // Load remembered email
        window.addEventListener('load', () => {
            const rememberedEmail = localStorage.getItem('remember-email');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
            }
        });
    </script>
</body>
</html>
