<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Healthcare - Hospitals</title>
    <link rel="stylesheet" href="styles-main.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">
                <div class="logo-circle">🌀</div>
                <h2>Aura Healthcare</h2>
            </div>

            <nav class="sidebar-menu">
                <a href="home.html" class="menu-item">
                    <span class="menu-icon">📝</span>
                    <span>Dashboard</span>
                </a>
                <a href="donors.html" class="menu-item">
                    <span class="menu-icon">🩸</span>
                    <span>Blood Donors</span>
                </a>
                <a href="medicines.html" class="menu-item">
                    <span class="menu-icon">💊</span>
                    <span>Medicines</span>
                </a>
                <a href="health-test.html" class="menu-item">
                    <span class="menu-icon">❤️</span>
                    <span>Health Test</span>
                </a>
                <a href="chatbot.html" class="menu-item">
                    <span class="menu-icon">🧠</span>
                    <span>AI Assistant</span>
                </a>
                <a href="profile.html" class="menu-item">
                    <span class="menu-icon">👤</span>
                    <span>Profile</span>
                </a>
                <a href="hospitals.html" class="menu-item active">
                    <span class="menu-icon">🏥</span>
                    <span>Hospitals</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="health-tip">
                    <h4>💡 Tip</h4>
                    <p>Find nearby hospitals and blood banks instantly</p>
                </div>
                <button class="theme-toggle-btn" onclick="toggleTheme()">🌙 Dark</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Top Bar -->
            <div class="dashboard-topbar">
                <div class="topbar-left">
                    <h1>Hospitals & Blood Banks</h1>
                    <p class="topbar-subtitle">Find healthcare facilities near you</p>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon" title="Notifications">🔔</button>
                    <button class="btn-icon" onclick="goToSettings()" title="Settings">⚙️</button>
                    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
                </div>
            </div>

            <!-- Search Section -->
            <div class="card">
                <h2>🔍 Find Nearby Facilities</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label style="color: var(--text-secondary); display: block; margin-bottom: 8px;">Latitude</label>
                        <input type="number" id="search-lat" placeholder="28.4744" step="0.0001" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary);">
                    </div>
                    <div>
                        <label style="color: var(--text-secondary); display: block; margin-bottom: 8px;">Longitude</label>
                        <input type="number" id="search-lng" placeholder="77.5714" step="0.0001" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary);">
                    </div>
                </div>
                <button onclick="detectLocation()" class="btn btn-secondary" style="width: 100%; padding: 12px; margin-bottom: 10px;">📍 Detect My Location</button>
                <button onclick="searchHospitals()" class="btn btn-primary" style="width: 100%; padding: 12px;">🔍 Search</button>
            </div>

            <!-- Results Section -->
            <div class="card">
                <h2>🏥 Available Facilities</h2>
                <div id="hospitals-list" style="margin-top: 20px;"></div>
            </div>
        </main>
    </div>

    <script src="utils.js"></script>
    <script>
        const HOSPITALS_DATA = [
            { id: 1, name: "Greater Noida Medical Center", type: "Hospital", lat: 28.4744, lng: 77.5714, phone: "9876543210", services: ["Blood Bank", "Emergency", "ICU"] },
            { id: 2, name: "Noida Blood Bank", type: "Blood Bank", lat: 28.4750, lng: 77.5720, phone: "9876543211", services: ["Blood Donation", "Blood Testing"] },
            { id: 3, name: "City Hospital", type: "Hospital", lat: 28.4730, lng: 77.5700, phone: "9876543212", services: ["Blood Bank", "Surgery", "Cardiology"] },
            { id: 4, name: "Red Cross Blood Center", type: "Blood Bank", lat: 28.4760, lng: 77.5730, phone: "9876543213", services: ["Blood Donation", "Plasma Collection"] },
            { id: 5, name: "Apollo Health Center", type: "Hospital", lat: 28.4720, lng: 77.5690, phone: "9876543214", services: ["Blood Bank", "Diagnostics", "Pharmacy"] }
        ];

        // Initialize theme
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            updateThemeButton();
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton();
        }

        function applyTheme(theme) {
            const root = document.documentElement;
            if (theme === 'light') {
                root.classList.add('light-theme');
            } else {
                root.classList.remove('light-theme');
            }
        }

        function updateThemeButton() {
            const theme = localStorage.getItem('theme') || 'dark';
            const btn = document.querySelector('.theme-toggle-btn');
            if (btn) {
                btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
            }
        }

        function detectLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    document.getElementById('search-lat').value = position.coords.latitude.toFixed(4);
                    document.getElementById('search-lng').value = position.coords.longitude.toFixed(4);
                    alert('✅ Location detected!');
                }, error => {
                    alert('❌ Location access denied');
                });
            } else {
                alert('❌ Geolocation not supported');
            }
        }

        function searchHospitals() {
            const lat = parseFloat(document.getElementById('search-lat').value);
            const lng = parseFloat(document.getElementById('search-lng').value);
            
            if (isNaN(lat) || isNaN(lng)) {
                alert('❌ Please enter valid coordinates');
                return;
            }

            const hospitals = HOSPITALS_DATA.map(h => ({
                ...h,
                distance: haversineDistance(lat, lng, h.lat, h.lng)
            })).sort((a, b) => a.distance - b.distance);

            displayHospitals(hospitals);
        }

        function displayHospitals(hospitals) {
            const container = document.getElementById('hospitals-list');
            
            if (hospitals.length === 0) {
                container.innerHTML = '<div class="info-message">No hospitals found.</div>';
                return;
            }
            
            let html = '';
            hospitals.forEach(hospital => {
                const typeIcon = hospital.type === 'Hospital' ? '🏥' : '🩸';
                html += `
                    <div class="hospital-card">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                            <div>
                                <h4>${typeIcon} ${hospital.name}</h4>
                                <p style="color: var(--text-secondary); margin: 5px 0;">${hospital.type}</p>
                            </div>
                            <span style="background: var(--primary); color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold;">${hospital.distance.toFixed(2)} km</span>
                        </div>
                        
                        <p style="margin: 10px 0;"><strong>📞 Phone:</strong> <a href="tel:${hospital.phone}" style="color: var(--secondary); text-decoration: none;">${hospital.phone}</a></p>
                        
                        <p style="margin: 10px 0;"><strong>🔧 Services:</strong></p>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;">
                            ${hospital.services.map(s => `<span class="badge badge-info">${s}</span>`).join('')}
                        </div>
                        
                        <button onclick="openMaps(${hospital.lat}, ${hospital.lng})" class="btn btn-primary" style="width: 100%; padding: 10px;">📍 Open in Maps</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function openMaps(lat, lng) {
            const url = `https://www.google.com/maps/search/${lat},${lng}`;
            window.open(url, '_blank');
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            displayHospitals(HOSPITALS_DATA);
        });
    </script>
</body>
</html>
