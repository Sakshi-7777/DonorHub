<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Healthcare - Social Feed</title>
    <link rel="stylesheet" href="styles-main.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">
                <div class="logo-circle">🌀</div>
                <h2>Aura Healthcare</h2>
            </div>

            <nav class="sidebar-menu">
                <a href="home.html" class="menu-item">
                    <span class="menu-icon">📝</span>
                    <span>Dashboard</span>
                </a>
                <a href="donors.html" class="menu-item">
                    <span class="menu-icon">🩸</span>
                    <span>Blood Donors</span>
                </a>
                <a href="medicines.html" class="menu-item">
                    <span class="menu-icon">💊</span>
                    <span>Medicines</span>
                </a>
                <a href="health-test.html" class="menu-item">
                    <span class="menu-icon">❤️</span>
                    <span>Health Test</span>
                </a>
                <a href="chatbot.html" class="menu-item">
                    <span class="menu-icon">🧠</span>
                    <span>AI Assistant</span>
                </a>
                <a href="profile.html" class="menu-item">
                    <span class="menu-icon">👤</span>
                    <span>Profile</span>
                </a>
                <a href="social.html" class="menu-item active">
                    <span class="menu-icon">👥</span>
                    <span>Social Feed</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="health-tip">
                    <h4>💡 Tip</h4>
                    <p>Share your health journey with the community</p>
                </div>
                <button class="theme-toggle-btn" onclick="toggleTheme()">🌙 Dark</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Top Bar -->
            <div class="dashboard-topbar">
                <div class="topbar-left">
                    <h1>Community Health Feed</h1>
                    <p class="topbar-subtitle">Share tips, stories, and inspire others</p>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon" title="Notifications">🔔</button>
                    <button class="btn-icon" onclick="goToSettings()" title="Settings">⚙️</button>
                    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
                </div>
            </div>

            <!-- Create Post Section -->
            <div class="card">
                <h2>✍️ Share Your Story</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <input type="text" id="social-author" placeholder="Your name" style="padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-size: 1em;">
                    <select id="social-type" style="padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-size: 1em;">
                        <option value="tip">💡 Health Tip</option>
                        <option value="story">📖 Donor Story</option>
                        <option value="experience">🎯 Experience</option>
                    </select>
                </div>
                <textarea id="social-content" placeholder="Share your health tip or inspiring story..." style="width: 100%; height: 120px; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary); font-family: inherit; font-size: 1em; resize: vertical;"></textarea>
                <button onclick="postToFeed()" class="btn btn-primary" style="margin-top: 15px; width: 100%; padding: 12px; font-size: 1em;">📤 Share Post</button>
            </div>

            <!-- Feed Section -->
            <div class="card">
                <h2>📰 Community Posts</h2>
                <div id="social-feed" style="margin-top: 20px;"></div>
            </div>
        </main>
    </div>

    <script src="utils.js"></script>
    <script>
        // Initialize theme
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
            updateThemeButton();
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton();
        }

        function applyTheme(theme) {
            const root = document.documentElement;
            if (theme === 'light') {
                root.classList.add('light-theme');
            } else {
                root.classList.remove('light-theme');
            }
        }

        function updateThemeButton() {
            const theme = localStorage.getItem('theme') || 'dark';
            const btn = document.querySelector('.theme-toggle-btn');
            if (btn) {
                btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
            }
        }

        function loadSocialFeed() {
            const feed = JSON.parse(localStorage.getItem('social-feed')) || [];
            const container = document.getElementById('social-feed');
            
            if (feed.length === 0) {
                container.innerHTML = '<div class="info-message">No posts yet. Be the first to share!</div>';
                return;
            }
            
            let html = '';
            feed.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(post => {
                const typeEmoji = post.type === 'tip' ? '💡' : post.type === 'story' ? '📖' : '🎯';
                const typeName = post.type === 'tip' ? 'Health Tip' : post.type === 'story' ? 'Donor Story' : 'Experience';
                
                html += `
                    <div class="social-post">
                        <div class="post-header">
                            <div>
                                <h4>${post.author}</h4>
                                <span class="badge badge-info">${typeEmoji} ${typeName}</span>
                            </div>
                            <span class="post-date">${formatDate(post.timestamp)}</span>
                        </div>
                        <div class="post-content">
                            <p>${post.content}</p>
                        </div>
                        <div class="post-actions">
                            <button onclick="likePost('${post.id}')" class="btn-small">👍 ${post.likes || 0}</button>
                            <button onclick="sharePost('${post.id}')" class="btn-small">📤 Share</button>
                            <button onclick="deletePost('${post.id}')" class="btn-small">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function postToFeed() {
            const author = document.getElementById('social-author').value.trim();
            const content = document.getElementById('social-content').value.trim();
            const type = document.getElementById('social-type').value;
            
            if (!author || !content) {
                alert('❌ Please fill in all fields');
                return;
            }
            
            const post = {
                id: Date.now(),
                author: author,
                content: content,
                type: type,
                timestamp: new Date().toISOString(),
                likes: 0
            };
            
            let feed = JSON.parse(localStorage.getItem('social-feed')) || [];
            feed.push(post);
            localStorage.setItem('social-feed', JSON.stringify(feed));
            
            document.getElementById('social-author').value = '';
            document.getElementById('social-content').value = '';
            loadSocialFeed();
            alert('✅ Post shared successfully!');
        }

        function likePost(postId) {
            let feed = JSON.parse(localStorage.getItem('social-feed')) || [];
            const post = feed.find(p => p.id == postId);
            if (post) {
                post.likes = (post.likes || 0) + 1;
                localStorage.setItem('social-feed', JSON.stringify(feed));
                loadSocialFeed();
            }
        }

        function sharePost(postId) {
            const feed = JSON.parse(localStorage.getItem('social-feed')) || [];
            const post = feed.find(p => p.id == postId);
            if (post) {
                if (navigator.share) {
                    navigator.share({
                        title: 'Aura Healthcare',
                        text: post.content,
                        url: window.location.href
                    });
                } else {
                    alert('Post: ' + post.content);
                }
            }
        }

        function deletePost(postId) {
            if (confirm('Delete this post?')) {
                let feed = JSON.parse(localStorage.getItem('social-feed')) || [];
                feed = feed.filter(p => p.id != postId);
                localStorage.setItem('social-feed', JSON.stringify(feed));
                loadSocialFeed();
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadSocialFeed();
        });
    </script>
</body>
</html>
